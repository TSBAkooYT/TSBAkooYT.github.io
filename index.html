<!DOCTYPE html>
<html>
<head>
  <title>Flappy Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      background: skyblue;
      text-align: center;
      font-family: Arial;
    }
    canvas {
      display: block;
      margin: auto;
      border: 2px solid black;
    }
    #score {
      font-size: 20px;
      margin: 10px;
    }
  </style>
</head>
<body>

<h2>🐦 Flappy Game</h2>
<div id="score">Score: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth * 0.9;
canvas.height = 500;

// 🐦 quş şəkli
const birdImg = new Image();
birdImg.src = "https://i.imgur.com/QZ6ZQZL.png"; // pulsuz şəkil

let bird = { x: 50, y: 200, w: 40, h: 30, velocity: 0 };
let gravity = 0.6;
let jump = -10;

let pipes = [];
let score = 0;
let gameOver = false;

function createPipe() {
  let gap = 130;
  let top = Math.random() * (canvas.height - gap);
  pipes.push({ x: canvas.width, top: top, bottom: top + gap, passed: false });
}

function draw() {
  if (gameOver) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // quş
  bird.velocity += gravity;
  bird.y += bird.velocity;
  ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

  // borular
  for (let i = 0; i < pipes.length; i++) {
    let p = pipes[i];
    p.x -= 3;

    ctx.fillStyle = "green";
    ctx.fillRect(p.x, 0, 50, p.top);
    ctx.fillRect(p.x, p.bottom, 50, canvas.height);

    // toqquşma (uduzma)
    if (
      bird.x < p.x + 50 &&
      bird.x + bird.w > p.x &&
      (bird.y < p.top || bird.y + bird.h > p.bottom)
    ) {
      endGame();
    }

    // score (düzgün işləyən)
    if (!p.passed && p.x + 50 < bird.x) {
      p.passed = true;
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    }
  }

  // yerə dəyərsə
  if (bird.y > canvas.height - bird.h) {
    endGame();
  }

  requestAnimationFrame(draw);
}

function endGame() {
  gameOver = true;
  alert("💀 Game Over! Score: " + score);
  location.reload();
}

setInterval(createPipe, 2000);

// 📱 touch + click
function jumpAction() {
  if (!gameOver) bird.velocity = jump;
}

document.addEventListener("touchstart", jumpAction);
document.addEventListener("click", jumpAction);

draw();
</script>

</body>
</html>
