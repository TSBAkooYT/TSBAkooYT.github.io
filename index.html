<!DOCTYPE html>
<html>
<head>
  <title>Ultra Flappy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial;
      transition: background 1s;
    }
    canvas {
      display: block;
      margin: auto;
      border: 2px solid black;
    }
    #ui {
      position: absolute;
      top: 10px;
      width: 100%;
      color: white;
      text-shadow: 2px 2px 4px black;
    }
    button {
      margin: 3px;
      padding: 5px 10px;
    }
  </style>
</head>
<body>

<div id="ui">
  <h2>🐦 Ultra Flappy</h2>
  <div id="score">Score: 0</div>
  <div id="high">High Score: 0</div>
  <button onclick="togglePause()">⏸ Pause</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth * 0.9;
canvas.height = 500;

// 🐦 quş
const birdImg = new Image();
birdImg.src = "https://i.imgur.com/QZ6ZQZL.png";

// 🎵 səs
const jumpSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
const bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.3;

let bird = { x: 60, y: 200, w: 40, h: 30, velocity: 0 };
let gravity = 0.5;
let jump = -9;

let pipes = [];
let score = 0;
let gameOver = false;
let paused = false;

// 🏅 high score
let highScore = localStorage.getItem("high") || 0;
document.getElementById("high").innerText = "High Score: " + highScore;

// 🟩 borular
function createPipe() {
  let gap = 170;
  let top = Math.random() * (canvas.height - gap);
  pipes.push({ x: canvas.width, top: top, bottom: top + gap, passed: false });
}

// ⏸ PAUSE FUNCTION
function togglePause() {
  paused = !paused;

  if (paused) {
    bgMusic.pause();
  } else {
    bgMusic.play();
    draw();
  }
}

// 🎮 GAME LOOP
function draw() {
  if (gameOver) return;

  if (paused) {
    requestAnimationFrame(draw);
    return;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // bird physics
  bird.velocity += gravity;
  bird.y += bird.velocity;

  ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

  // pipes
  for (let i = 0; i < pipes.length; i++) {
    let p = pipes[i];
    p.x -= 2;

    ctx.fillStyle = "green";
    ctx.fillRect(p.x, 0, 60, p.top);
    ctx.fillRect(p.x, p.bottom, 60, canvas.height);

    // collision
    if (
      bird.x < p.x + 60 &&
      bird.x + bird.w > p.x &&
      (bird.y < p.top || bird.y + bird.h > p.bottom)
    ) {
      endGame();
    }

    // score
    if (!p.passed && p.x + 60 < bird.x) {
      p.passed = true;
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    }
  }

  if (bird.y > canvas.height - bird.h) {
    endGame();
  }

  requestAnimationFrame(draw);
}

function endGame() {
  gameOver = true;

  if (score > highScore) {
    localStorage.setItem("high", score);
  }

  setTimeout(() => {
    alert("💀 Game Over! Score: " + score);
    location.reload();
  }, 200);
}

// 📱 control
function flap() {
  if (!gameOver && !paused) {
    bird.velocity = jump;
    jumpSound.currentTime = 0;
    jumpSound.play();
    bgMusic.play();
  }
}

document.addEventListener("touchstart", flap);
document.addEventListener("click", flap);

setInterval(createPipe, 3000);

draw();
</script>

</body>
</html>
