<!DOCTYPE html>
<html>
<head>
  <title>Pro Flappy Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to bottom, #70c5ce, #ffffff);
    }
    canvas {
      display: block;
      margin: auto;
      border: 2px solid black;
      background: linear-gradient(#87CEEB, #E0F7FF);
    }
    #score, #high {
      font-size: 20px;
      margin: 5px;
    }
  </style>
</head>
<body>

<h2>🐦 Flappy Pro</h2>
<div id="score">Score: 0</div>
<div id="high">High Score: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth * 0.9;
canvas.height = 500;

// 🐦 quş şəkli
const birdImg = new Image();
birdImg.src = "https://i.imgur.com/QZ6ZQZL.png";

// 🔊 səs
const jumpSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
const dieSound = new Audio("https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3");

let bird = { x: 60, y: 200, w: 40, h: 30, velocity: 0 };
let gravity = 0.5;
let jump = -9;

let pipes = [];
let score = 0;
let gameOver = false;

// 🏅 high score (yadda saxlayır)
let highScore = localStorage.getItem("high") || 0;
document.getElementById("high").innerText = "High Score: " + highScore;

// 🟩 borular daha aralı + gap böyük
function createPipe() {
  let gap = 160; // daha geniş keçid
  let top = Math.random() * (canvas.height - gap);
  pipes.push({ x: canvas.width, top: top, bottom: top + gap, passed: false });
}

// 🚀 smooth draw
function draw() {
  if (gameOver) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // quş
  bird.velocity += gravity;
  bird.y += bird.velocity;
  ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

  // borular
  for (let i = 0; i < pipes.length; i++) {
    let p = pipes[i];
    p.x -= 2.5; // bir az yavaş (asan olsun)

    ctx.fillStyle = "#2ecc71";
    ctx.fillRect(p.x, 0, 60, p.top);
    ctx.fillRect(p.x, p.bottom, 60, canvas.height);

    // toqquşma
    if (
      bird.x < p.x + 60 &&
      bird.x + bird.w > p.x &&
      (bird.y < p.top || bird.y + bird.h > p.bottom)
    ) {
      endGame();
    }

    // score
    if (!p.passed && p.x + 60 < bird.x) {
      p.passed = true;
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    }
  }

  // yerə düşmə
  if (bird.y > canvas.height - bird.h) {
    endGame();
  }

  requestAnimationFrame(draw);
}

function endGame() {
  gameOver = true;
  dieSound.play();

  // high score update
  if (score > highScore) {
    localStorage.setItem("high", score);
  }

  setTimeout(() => {
    alert("💀 Game Over!\nScore: " + score);
    location.reload();
  }, 200);
}

// 📱 touch + click + səs
function jumpAction() {
  if (!gameOver) {
    bird.velocity = jump;
    jumpSound.currentTime = 0;
    jumpSound.play();
  }
}

document.addEventListener("touchstart", jumpAction);
document.addEventListener("click", jumpAction);

// borular daha gec gəlsin
setInterval(createPipe, 2500);

draw();
</script>

</body>
</html>
