<!DOCTYPE html>
<html>
<head>
  <title>Ultra Flappy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: Arial;
      transition: background 1s;
    }
    canvas {
      display: block;
      margin: auto;
      border: 2px solid black;
    }
    #score, #high {
      font-size: 20px;
    }
  </style>
</head>
<body>

<h2>🐦 Ultra Flappy</h2>
<div id="score">Score: 0</div>
<div id="high">High Score: 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth * 0.9;
canvas.height = 500;

// 🐦 quş şəkli
const birdImg = new Image();
birdImg.src = "https://i.imgur.com/QZ6ZQZL.png";

// 🎵 səslər
const jumpSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");
const dieSound = new Audio("https://www.soundjay.com/misc/sounds/fail-buzzer-02.mp3");

// 🎵 arxa fon musiqisi
const bgMusic = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3");
bgMusic.loop = true;
bgMusic.volume = 0.3;

let bird = { x: 60, y: 200, w: 40, h: 30, velocity: 0, angle: 0 };
let gravity = 0.5;
let jump = -9;

let pipes = [];
let score = 0;
let gameOver = false;

// 🏅 high score
let highScore = localStorage.getItem("high") || 0;
document.getElementById("high").innerText = "High Score: " + highScore;

// 🌙 gecə/gündüz
let isNight = false;
setInterval(() => {
  isNight = !isNight;
  document.body.style.background = isNight
    ? "linear-gradient(#0f2027, #203a43, #2c5364)"
    : "linear-gradient(#70c5ce, #ffffff)";
}, 8000);

// 🟩 borular (DAHA ARALI)
function createPipe() {
  let gap = 170;
  let top = Math.random() * (canvas.height - gap);
  pipes.push({ x: canvas.width, top: top, bottom: top + gap, passed: false });
}

// 🚀 draw
function draw() {
  if (gameOver) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // quş physics
  bird.velocity += gravity;
  bird.y += bird.velocity;
  bird.angle = bird.velocity * 2;

  // 🐦 rotate quş
  ctx.save();
  ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
  ctx.rotate(bird.angle * Math.PI/180);
  ctx.drawImage(birdImg, -bird.w/2, -bird.h/2, bird.w, bird.h);
  ctx.restore();

  // borular
  for (let i = 0; i < pipes.length; i++) {
    let p = pipes[i];
    p.x -= 2;

    ctx.fillStyle = "green";
    ctx.fillRect(p.x, 0, 60, p.top);
    ctx.fillRect(p.x, p.bottom, 60, canvas.height);

    // collision
    if (
      bird.x < p.x + 60 &&
      bird.x + bird.w > p.x &&
      (bird.y < p.top || bird.y + bird.h > p.bottom)
    ) {
      endGame();
    }

    // score
    if (!p.passed && p.x + 60 < bird.x) {
      p.passed = true;
      score++;
      document.getElementById("score").innerText = "Score: " + score;
    }
  }

  // yerə düşmə
  if (bird.y > canvas.height - bird.h) {
    endGame();
  }

  requestAnimationFrame(draw);
}

function endGame() {
  gameOver = true;
  dieSound.play();

  if (score > highScore) {
    localStorage.setItem("high", score);
  }

  setTimeout(() => {
    alert("💀 Game Over! Score: " + score);
    location.reload();
  }, 200);
}

// 📱 touch/click
function jumpAction() {
  if (!gameOver) {
    bird.velocity = jump;
    jumpSound.currentTime = 0;
    jumpSound.play();

    // 🎵 musiqi başlasın
    bgMusic.play();
  }
}

document.addEventListener("touchstart", jumpAction);
document.addEventListener("click", jumpAction);

// borular daha gec gəlsin (ARALIQ)
setInterval(createPipe, 3000);

draw();
</script>

</body>
</html>
